version: "3.9"

services:
  api:
    build: .
    container_name: engine_maintenance_api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/engine_model.cbm
    volumes:
      # Позволяет обновлять модель без пересборки образа
      - ./models:/app/models:ro
    restart: unless-stopped
